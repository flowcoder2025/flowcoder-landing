name: update-course-stats

# 인프런 공개 페이지의 강의 수강생 수·평점을 주 1회 가져와 src/data/course-stats.json 을 갱신하고,
# 변경이 있으면 PR을 생성한다(사용자 룰: main 직접 push 금지 → PR로만 머지). 머지 시 Vercel 재배포.
on:
  schedule:
    # 매주 월요일 03:00 KST (= 일요일 18:00 UTC)
    - cron: "0 18 * * 0"
  workflow_dispatch: {}

# 최소 권한.
permissions:
  contents: write
  pull-requests: write

# 동시 실행 방지(중복 PR/푸시 방지).
concurrency:
  group: update-course-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          persist-credentials: true

      - name: Setup Node 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 1) 순수 파서 단위테스트(네트워크 무관, 결정적). 회귀 시 즉시 실패.
      - name: Parser unit tests
        run: node --test scripts/lib/parse-course-stats.test.mjs

      # 2) 인프런 fetch → 파싱 → 교차검증 → sanity → 변경 시 JSON 갱신.
      #    한 강의라도 실패하면 exit 1 → job 실패(가시화), 파일 미변경.
      - name: Update course stats
        run: node scripts/update-course-stats.mjs

      # 3) 갱신된 JSON이 빌드에 반영되는지까지 검증.
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # 4) JSON이 바뀐 경우에만 PR 생성/갱신(수동 머지).
      - name: Open or update PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- src/data/course-stats.json; then
            echo "변경 없음 — PR 생략."
            exit 0
          fi

          BRANCH="chore/course-stats-auto"
          DATE="$(date -u +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/data/course-stats.json
          git commit -m "chore: 인프런 강의 통계 자동 갱신 (${DATE})"
          git push --force origin "$BRANCH"

          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: 인프런 강의 통계 자동 갱신 (${DATE})" \
              --body $'인프런 공개 페이지 기준 강의 수강생 수·평점 자동 갱신.\n\n- 생성 스크립트: `scripts/update-course-stats.mjs`\n- 검증: 파서 단위테스트 + 두 구조화 소스 교차검증 + sanity guard 통과\n- 머지 시 Vercel 재배포\n\n🤖 자동 생성 PR'
          else
            echo "기존 열린 PR에 브랜치 갱신 완료."
          fi
