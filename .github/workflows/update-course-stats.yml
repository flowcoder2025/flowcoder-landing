name: update-course-stats

# 인프런 공개 페이지의 강의 수강생 수·평점을 주 1회 가져와 src/data/course-stats.json 을 갱신하고,
# 변경이 있으면 main에 직접 커밋한다(PR 없이 자동 반영). author=flowcoder25@gmail.com → Vercel 프로덕션 자동 배포.
on:
  schedule:
    # 매주 월요일 03:00 KST (= 일요일 18:00 UTC)
    - cron: "0 18 * * 0"
  workflow_dispatch: {}

# 최소 권한(main 직접 커밋만 — PR 미사용).
permissions:
  contents: write

# 동시 실행 방지(중복 PR/푸시 방지).
concurrency:
  group: update-course-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          persist-credentials: true

      - name: Setup Node 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 1) 순수 파서 단위테스트(네트워크 무관, 결정적). 회귀 시 즉시 실패.
      - name: Parser unit tests
        run: node --test scripts/lib/parse-course-stats.test.mjs

      # 2) 인프런 fetch → 파싱 → 교차검증 → sanity → 변경 시 JSON 갱신.
      #    한 강의라도 실패하면 exit 1 → job 실패(가시화), 파일 미변경.
      - name: Update course stats
        run: node scripts/update-course-stats.mjs

      # 3) 갱신된 JSON이 빌드에 반영되는지까지 검증.
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # 4) JSON이 바뀐 경우에만 main에 직접 커밋(PR 없이 자동 반영).
      #    author = 인가 계정(flowcoder25@gmail.com)이라 Vercel 프로덕션 배포가 자동 트리거됨.
      #    (bot author로 커밋하면 Preview만 생성되고 프로덕션 배포가 막힘 — 학습됨)
      - name: Commit to main if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- src/data/course-stats.json; then
            echo "변경 없음 — 커밋 생략."
            exit 0
          fi

          DATE="$(date -u +%Y-%m-%d)"
          git config user.name "flowcoder25"
          git config user.email "flowcoder25@gmail.com"
          git add src/data/course-stats.json
          git commit -m "chore: 인프런 강의 통계 자동 갱신 (${DATE})"
          git push origin HEAD:main
